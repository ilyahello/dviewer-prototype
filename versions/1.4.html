<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Viewer 1.4</title>
</head>
<body>
  <p>Opening Data Viewer 1.4...</p>
  <script>
    (async function () {
      const url = 'https://raw.githubusercontent.com/ilyahello/dviewer-prototype/main/Data%20Viewer%201.4%20(Standalone).html';
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error('Failed to load Data Viewer 1.4');
      const html = await response.text();
      document.open();
      document.write(html);
      document.close();
    })().catch(function (error) {
      document.body.textContent = error.message;
    });
  </script>
</body>
</html>
